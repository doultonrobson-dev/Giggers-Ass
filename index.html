<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gig-Sync Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stage-container">
        <div class="control-deck">
            <div class="input-box">
                <label>1. LOAD AUDIO</label>
                <input type="file" id="audioInput" accept="audio/mpeg, .mp3">
            </div>
            <div class="input-box">
                <label>2. FIND LYRICS</label>
                <div class="btn-group">
                    <button id="googleSearch" style="background: #4285F4;">🔍 Search Google</button>
                    <button id="toggleManual" style="background: #34A853;">✍️ Paste/Type</button>
                </div>
            </div>
        </div>

        <div class="lyric-monitor">
            <h1 id="trackName">SELECT A TRACK</h1>
            <div id="displayWrapper">
                <p id="lyricDisplay">WAITING...</p>
            </div>
        </div>

        <div class="transport-bar">
            <audio id="audioPlayer" controls></audio>
            
            <div id="manualInputArea" class="modal" style="display:none;">
                <h3>Paste Lyrics with Timestamps</h3>
                <p style="font-size: 0.8rem; color: #ffcc00;">Format: [00:12.00] Lyric line</p>
                <textarea id="manualText" placeholder="[00:01.00] Intro..."></textarea>
                <div class="modal-buttons">
                    <button id="saveManual">SYNC TO TRACK</button>
                    <button onclick="document.getElementById('manualInputArea').style.display='none'" style="background:#555;">CANCEL</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
