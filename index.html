<div class="main-container">
    <div class="setlist-sidebar">
        <h3>Setlist</h3>
        <ul id="songList">
            <li onclick="loadGigSong('song1.mp3', 'song1.lrc')">1. Song Title One</li>
            <li onclick="loadGigSong('song2.mp3', 'song2.lrc')">2. Song Title Two</li>
        </ul>
        <hr>
        <p style="font-size: 0.7rem;">Click a song to load it instantly.</p>
    </div>

    <div class="player-card">
        <h2 id="currentTrackTitle">🎤 Live Performer Mode</h2>
        <audio id="audioPlayer" controls></audio>
        <div id="displayWrapper">
            <p id="lyricDisplay">Select a song to begin...</p>
        </div>
        
        <div class="backup-controls">
            <button onclick="document.getElementById('manualInputArea').style.display='block'">Manual Backup</button>
        </div>
    </div>
</div>
