<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncLyric Web Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-card">
        <h2>🎵 Audio & Lyric Player</h2>
        
        <div class="upload-section">
            <div class="control-group">
                <label>1. Select Audio (MP3)</label>
                <input type="file" id="audioInput" accept="audio/mpeg, audio/wav, audio/ogg, .mp3">
            </div>

            <div class="control-group">
                <label>2. Add Lyrics</label>
                <div class="button-row">
                    <input type="file" id="lyricInput" accept=".lrc,.txt" style="display:none;">
                    <button type="button" onclick="document.getElementById('lyricInput').click()">📁 Upload .LRC</button>
                    <button type="button" id="toggleManual">✍️ Type Manually</button>
                </div>
            </div>
        </div>

        <div id="manualInputArea" style="display:none;">
            <p style="font-size: 0.8rem; color: #ffcc00; margin-bottom: 5px;">
                Use format: [mm:ss.xx] Lyric Text
            </p>
            <textarea id="manualText" placeholder="[00:01.00] First Line&#10;[00:05.50] Second Line"></textarea>
            <button type="button" id="saveManual" style="background: #28a745; margin-top: 10px;">Save & Sync Lyrics</button>
        </div>

        <audio id="audioPlayer" controls></audio>

        <div id="displayWrapper">
            <p id="lyricDisplay">Waiting for files...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
